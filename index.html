<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Video o Presentación</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input{
margin:20px 0;
}

video,iframe{
width:100%;
height:500px;
border:none;
margin-top:20px;
}
</style>

</head>
<body>

<div class="container">
<h1>Sube tu Video o Presentación</h1>

<input type="file" id="archivo" accept=".mp4,.mov,.webm,.pdf">

<div id="visor"></div>

</div>

<script>
const archivo=document.getElementById("archivo");
const visor=document.getElementById("visor");

archivo.addEventListener("change",function(){

visor.innerHTML="";

const file=this.files[0];
if(!file) return;

const url=URL.createObjectURL(file);

if(file.type.startsWith("video/")){
visor.innerHTML=`
<video controls>
<source src="${url}" type="${file.type}">
</video>
`;
}else if(file.type==="application/pdf"){
visor.innerHTML=`
<iframe src="${url}"></iframe>
`;
}else{
visor.innerHTML="<p>Formato no compatible.</p>";
}

});
</script>

</body>
</html>
